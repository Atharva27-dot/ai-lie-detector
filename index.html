<!DOCTYPE html>
<html>
<head>
    <title>AI Lie Detector Pro</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
        }

        .container {
            width: 60%;
            margin: auto;
            margin-top: 20px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .chat-box {
            height: 280px;
            overflow-y: auto;
            padding: 10px;
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
        }

        .user, .bot {
            padding: 10px;
            margin: 10px;
            border-radius: 15px;
            max-width: 70%;
            animation: fadeIn 0.3s ease-in;
        }

        .user {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            margin-left: auto;
        }

        .bot {
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
        }

        .input-area {
            display: flex;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 20px;
            margin-left: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff7eb3, #ff758c);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #ff7eb3;
        }

        .progress-container {
            width: 100%;
            background: #444;
            border-radius: 10px;
            margin-top: 10px;
        }

        #progress-bar {
            height: 20px;
            width: 0%;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            color: white;
        }

        #explanation {
            margin-top: 10px;
            font-style: italic;
            opacity: 0.8;
        }

        canvas {
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🧠 AI Lie Detector Pro</h1>

    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
        <input type="text" id="inputText" placeholder="Type your statement...">
        <button onclick="analyze()">Analyze</button>
    </div>

    <div class="progress-container">
        <div id="progress-bar">0%</div>
    </div>

    <div id="explanation"></div>

    <canvas id="chart"></canvas>

</div>

<script>
let chart;

async function analyze() {
    let text = document.getElementById("inputText").value;
    let chatBox = document.getElementById("chat-box");

    if (text === "") return;

    chatBox.innerHTML += `<div class="user">🧑 ${text}</div>`;

    let response = await fetch("/analyze", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text: text})
    });

    let data = await response.json();

    let color = "#f1c40f";
    if (data.result.includes("Truth")) color = "#2ecc71";
    else if (data.result.includes("Lie")) color = "#e74c3c";

    chatBox.innerHTML += `
        <div class="bot" style="background:${color}">
            🤖 ${data.result} (${data.score}%)
        </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;

    let bar = document.getElementById("progress-bar");
    bar.style.width = data.score + "%";
    bar.innerText = data.score + "%";

    if (data.score > 65) bar.style.background = "#e74c3c";
    else if (data.score < 40) bar.style.background = "#2ecc71";
    else bar.style.background = "#f1c40f";

    document.getElementById("explanation").innerText = "💡 " + data.explanation;

    updateChart(data.score);

    document.getElementById("inputText").value = "";
}

function updateChart(score) {
    let ctx = document.getElementById("chart").getContext("2d");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Truth', 'Lie'],
            datasets: [{
                data: [score, 100-score],
                backgroundColor: ['#2ecc71', '#e74c3c']
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: { color: "white" }
                }
            }
        }
    });
}

document.getElementById("inputText").addEventListener("keypress", function(e) {
    if (e.key === "Enter") analyze();
});
</script>

</body>
</html>
